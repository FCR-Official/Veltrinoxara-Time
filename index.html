<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veltrinoxara Chronometer</title>
    <style>
        body {
            background-color: #050a0f;
            color: #00f2ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .clock-container {
            border: 1px solid #00f2ff;
            padding: 30px;
            margin: 10px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .label { font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
        .time { font-size: 2rem; }
    </style>
</head>
<body>

    <!-- Earth Clock -->
    <div class="clock-container">
        <div class="label">Earth Standard Time</div>
        <div id="e-clock" class="time">00:00:00</div>
    </div>

    <!-- Veltrinoxara Clock -->
    <div class="clock-container">
        <div class="label">Veltrinoxara Cycle</div>
        <div id="v-clock" class="time">Day 000 | 00:00</div>
    </div>

    <script>
        // Set this to false to make the clock static
        const isRunning = false; 

        function updateClocks() {
            const now = new Date();
            
            // Earth Clock
            document.getElementById('e-clock').innerText = now.toLocaleTimeString();

            // Veltrinoxara Clock
            if (isRunning) {
                const veltrinoxaraRatio = 26 / 24;
                const vTime = now.getTime() / veltrinoxaraRatio;
                const vDay = Math.floor(vTime / (1000 * 60 * 60 * 26)) % 400;
                const vHour = Math.floor((vTime / (1000 * 60 * 60)) % 26);
                const vMinute = Math.floor((vTime / (1000 * 60)) % 60);
                
                document.getElementById('v-clock').innerText = 
                    `Day ${vDay.toString().padStart(3, '0')} | ${vHour.toString().padStart(2, '0')}:${vMinute.toString().padStart(2, '0')}`;
            } else {
                // Static display if isRunning is false
                document.getElementById('v-clock').innerText = `Day 142 | 13:00`;
            }
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
