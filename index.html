<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veltrinoxara Clock</title>
    <style>
        body {
            background-color: #050a0f; /* Deep space blue */
            color: #00f2ff; /* Cyber-cyan */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 1px solid #00f2ff;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            text-align: center;
        }
        h1 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .clock { font-size: 2.5rem; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Veltrinoxara Time</h1>
        <div id="v-clock" class="clock">Loading...</div>
        <div id="e-clock">Earth: <span id="e-time"></span></div>
    </div>

    <script>
        function updateClocks() {
            const now = new Date();
            
            // Earth Time Display
            document.getElementById('e-time').innerText = now.toLocaleTimeString();

            // Veltrinoxara Logic
            // Ratio: 26 hours / 24 hours = 1.08333...
            // We use UTC timestamp to ensure consistency
            const veltrinoxaraRatio = 26 / 24;
            const earthMs = now.getTime();
            const veltrinoxaraMs = earthMs / veltrinoxaraRatio;

            // Calculate cycle components
            const msPerDay = 1000 * 60 * 60 * 26;
            const vDay = Math.floor(veltrinoxaraMs / msPerDay) % 400;
            const vHour = Math.floor((veltrinoxaraMs / (1000 * 60 * 60)) % 26);
            const vMinute = Math.floor((veltrinoxaraMs / (1000 * 60)) % 60);

            document.getElementById('v-clock').innerText = 
                `Day ${vDay} | ${vHour.toString().padStart(2, '0')}:${vMinute.toString().padStart(2, '0')}`;
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
